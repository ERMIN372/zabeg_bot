<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Админ-панель</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <header class="topbar">
    <div class="topbar-title" id="topbar-title">Админ-панель</div>
    <div class="topbar-sub" id="topbar-sub"></div>
  </header>

  <nav class="tabs" id="tabs">
    <button class="tab" data-view="events">Мероприятия</button>
    <button class="tab" data-view="users">Люди</button>
    <button class="tab" data-view="analytics">Аналитика</button>
    <button class="tab" data-view="texts">Тексты</button>
  </nav>

  <main id="app" class="app"></main>

  <div id="toast" class="toast hidden"></div>

  <script src="/static/app.js"></script>
</body>
</html>
