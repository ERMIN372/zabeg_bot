services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: zabeg
      POSTGRES_USER: zabeg
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zabeg}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zabeg -d zabeg"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  migrate:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zabeg:${POSTGRES_PASSWORD:-zabeg}@postgres:5432/zabeg
    command: alembic upgrade head
    depends_on:
      postgres:
        condition: service_healthy

  bot:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zabeg:${POSTGRES_PASSWORD:-zabeg}@postgres:5432/zabeg
    command: python -m bot.main
    restart: unless-stopped
    # api.telegram.org резолвится и по IPv6, которого нет в docker-сети
    # ("Network is unreachable") — принудительно отключаем IPv6, идём по IPv4.
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      migrate:
        condition: service_completed_successfully

  scheduler:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://zabeg:${POSTGRES_PASSWORD:-zabeg}@postgres:5432/zabeg
    command: python -m scheduler.main
    restart: unless-stopped
    # см. комментарий в сервисе bot: отключаем IPv6 ради IPv4-доступа к Telegram
    sysctls:
      - net.ipv6.conf.all.disable_ipv6=1
    depends_on:
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
